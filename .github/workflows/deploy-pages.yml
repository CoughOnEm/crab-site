name: Deploy Fallon site to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['fallon/**', '.github/workflows/deploy-pages.yml']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site — flagship at root, premium and pitch alongside
        run: |
          mkdir -p _site
          cp -r fallon/. _site/
          rm -rf _site/source-assets
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
